version: 2

models:
  - name: games_by_year
    description: "Number of games released per year. This table is partitioned by release_year for demonstration purposes."

  - name: games_by_genre
    description: "Number of games per genre. This table is clustered by genre_name for demonstration purposes."

  - name: genre_avg_rating
    description: "Average rating per genre along with the number of games. This table is clustered by genre_name for demonstration purposes."

  - name: genre_popularity
    description: "Genre popularity based on the 'added' metric. This table is clustered by genre_name for demonstration purposes."

  - name: genre_platform_distribution
    description: "Number of games by genre-platform combination. This table is clustered by genre_name and platform_name for demonstration purposes."