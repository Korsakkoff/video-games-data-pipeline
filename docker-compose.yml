volumes:
  kestra_postgres_data:
    driver: local
  kestra_data:
    driver: local
  kestra_tmp:
    driver: local
  
services:
  kestra_postgres:
      image: postgres:17
      volumes:
        - kestra_postgres_data:/var/lib/postgresql/data
      environment:
        POSTGRES_DB: ${KESTRA_POSTGRES_DB}
        POSTGRES_USER: ${KESTRA_POSTGRES_USER}
        POSTGRES_PASSWORD: ${KESTRA_POSTGRES_PASSWORD}
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
        interval: 15s
        timeout: 10s
        retries: 10
  kestra:
    image: kestra/kestra:latest
    user: "root"
    container_name: kestra
    command: server standalone
    volumes:
      - kestra_data:/app/storage
      - kestra_tmp:/tmp/kestra-wd
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/app/project
    env_file:
    - .env
    environment:
      ENV_RAWG_API_KEY: ${RAWG_API_KEY}
      ENV_GCS_BUCKET: ${GCS_BUCKET}
      ENV_GCS_RAW_PREFIX: ${GCS_RAW_PREFIX}
      ENV_GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS}   
      KESTRA_CONFIGURATION: |
        datasources:
            postgres:
              url: jdbc:postgresql://kestra_postgres:5432/kestra
              driverClassName: org.postgresql.Driver
              username: ${KESTRA_POSTGRES_USER}
              password: ${KESTRA_POSTGRES_PASSWORD}
        kestra:
          server:
            basic-auth:
              username: ${KESTRA_USERNAME}
              password: ${KESTRA_PASSWORD}
          repository:
            type: postgres
          storage:
            type: local
            local:
              basePath: "/app/storage"
          queue:
            type: postgres
          tasks:
            tmpDir:
              path: /tmp/kestra-wd/tmp
          plugins:
            configurations:
              - type: io.kestra.plugin.scripts.runner.docker.Docker
                values:
                  volume-enabled: true
          url: http://localhost:8080/
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      kestra_postgres:
        condition: service_healthy