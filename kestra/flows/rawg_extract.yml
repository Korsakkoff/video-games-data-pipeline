id: rawg_extract
namespace: video_games

inputs:
  - id: year
    type: INT
  - id: max_pages
    type: STRING
    required: false

tasks:
  - id: run_extract
    type: io.kestra.plugin.scripts.shell.Commands
    containerImage: rawg-pipeline:latest
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      volumes:
        - /home/didac/VSCode/video-games-data-pipeline:/app/project
        - /home/didac/VSCode/video-games-data-pipeline/credentials:/app/credentials
    env:
      START_DATE: "{{ inputs.year }}-01-01"
      END_DATE: "{{ inputs.year }}-12-31"
      MAX_PAGES: "{{ inputs.max_pages is empty ? null : inputs.max_pages }}"
      RAWG_API_KEY: "{{ envs.rawg_api_key }}"
      GCS_BUCKET: "{{ envs.gcs_bucket }}"
      GCS_RAW_PREFIX: "{{ envs.gcs_raw_prefix }}"
    commands:
      - cd /app/project
      - python -m src.extract.extract_rawg_games_to_gcs