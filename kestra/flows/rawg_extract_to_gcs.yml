id: rawg_extract_to_gcs 
namespace: video_games 

inputs: 
  - id: year
    type: SELECT
    defaults: 2020
    values:
      - 2020
      - 2021
      - 2022
      - 2023
      - 2024
      - 2025
  - id: max_pages 
    type: INT 
    defaults: 2 

tasks: 
  - id: run_extract
    type: io.kestra.plugin.scripts.shell.Commands
    containerImage: rawg-pipeline:latest
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      volumes:
        - /home/didac/VSCode/video-games-data-pipeline:/app/project
        - /home/didac/VSCode/video-games-data-pipeline/credentials:/app/credentials
    env: 
      START_DATE: "{{ inputs.year }}-01-01" 
      END_DATE: "{{ inputs.year }}-12-31" 
      MAX_PAGES: "{{ inputs.max_pages }}" 
      RAWG_API_KEY: "{{ envs.rawg_api_key }}" 
      GCS_BUCKET: "{{ envs.gcs_bucket }}" 
      GCS_RAW_PREFIX: "{{ envs.gcs_raw_prefix }}" 
      GOOGLE_APPLICATION_CREDENTIALS: "{{ envs.google_application_credentials }}" 
    commands: 
      - cd /app/project 
      - python -m src.extract.extract_rawg_games_gcs
      
  - id: process_rawg
    type: io.kestra.plugin.core.flow.Subflow
    namespace: video_games
    flowId: rawg_build_processed_tables
    wait: true
    inputs:
      year: "{{ inputs.year }}"