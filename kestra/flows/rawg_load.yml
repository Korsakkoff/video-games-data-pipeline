id: rawg_load
namespace: video_games

inputs:
  - id: year
    type: INT

tasks:
  - id: load
    type: io.kestra.plugin.scripts.shell.Commands
    containerImage: rawg-pipeline:latest
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      volumes:
        - /home/didac/VSCode/video-games-data-pipeline:/app/project
        - /home/didac/VSCode/video-games-data-pipeline/credentials:/app/credentials
    env: 
      YEAR: "{{ inputs.year }}"
      GCS_BUCKET: "{{ envs.gcs_bucket }}"
      GCP_PROJECT_ID: "{{ envs.gcp_project_id }}"
      BQ_DATASET_RAW_PREFIX: "{{ envs.bq_dataset_raw_prefix }}"
      BQ_LOCATION: "{{ envs.bq_location }}"
      GOOGLE_APPLICATION_CREDENTIALS: "{{ envs.google_application_credentials }}"
    commands: 
      - cd /app/project 
      - python -m src.load.load_rawg_to_bigquery