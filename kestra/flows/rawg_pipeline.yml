id: rawg_pipeline
namespace: video_games

inputs:
  - id: year
    type: SELECT
    defaults: 2020
    values:
      - 2020
      - 2021
      - 2022
      - 2023
      - 2024
      - 2025
    required: true
  - id: max_pages
    type: INT
    defaults: 2

tasks:
  - id: extract
    type: io.kestra.plugin.core.flow.Subflow
    namespace: video_games
    flowId: rawg_extract
    wait: true
    transmitFailed: true
    inputs:
      year: "{{ inputs.year }}"
      max_pages: "{{ inputs.max_pages }}"

  - id: process
    type: io.kestra.plugin.core.flow.Subflow
    namespace: video_games
    flowId: rawg_process
    wait: true
    transmitFailed: true
    inputs:
      year: "{{ inputs.year }}"

  - id: load
    type: io.kestra.plugin.core.flow.Subflow
    namespace: video_games
    flowId: rawg_load
    wait: true
    transmitFailed: true
    inputs:
      year: "{{ inputs.year }}"

  - id: dbt
    type: io.kestra.plugin.core.flow.Subflow
    namespace: video_games
    flowId: rawg_dbt
    wait: true
    transmitFailed: true